<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGL Treasure Collector</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div><strong>Treasure Collector</strong></div>
    <div>WASD to move</div>
  </div>

  <canvas id="glCanvas"></canvas>
  <script type="module" src="./main.js"></script>
</body>
</html>
